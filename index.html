<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="google-site-verification" content="1XYvNp3KDylNaVS3TH15kSAKQHPIjMQZm_zIHLQBIt8" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZZ-PROMOVIES - Multi-Server OTT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async="async" data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>
<style>
:root { --watcho-orange: #ff4f00; --bg-dark: #07080a; }
body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.poster-3d { transition: all 0.8s ease-in-out; position: absolute; inset: 0; opacity: 0; transform: scale(0.9) translateZ(-50px); }
.poster-active { opacity: 1; transform: scale(1) translateZ(0); z-index: 10; }
.movie-card { transition: all 0.3s ease; flex-shrink: 0; cursor: pointer; border-radius: 8px; overflow: hidden; position: relative; }
.movie-card:hover { transform: translateY(-10px) scale(1.05); border: 2px solid var(--watcho-orange); }
#playerOverlay { display: none; position: fixed; inset: 0; background: black; z-index: 9999; }
.server-btn { background: #222; padding: 8px 15px; border-radius: 5px; font-size: 12px; transition: 0.3s; }
.server-btn:hover, .server-btn.active { background: var(--watcho-orange); }
.gold-review { position: absolute; top: 5px; right: 5px; background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; }
.smart-ad-box { width: 1px; height: 1px; opacity: 0.01; position: absolute; top: -50px; left: -50px; overflow: hidden; }

@media (max-width: 768px) {
    nav h1 { font-size: 1.5rem !important; text-align: center; width: 100%; }
    #search { width: 100% !important; margin-top: 10px; }
    .fixed.top-\[72px\] { top: 125px !important; } 
    #hero-slider { margin-top: 160px !important; height: 400px !important; }
}
</style>
</head>
<body onclick="handleFirstTouch()">

<div class="smart-ad-box" id="adContainer">
    <div id="container-745c1ef3a6af871203febf2e53f94208"></div>
    <script async="async" data-cfasync="false" src="https://www.highperformanceformat.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>
</div>

<nav class="fixed top-0 w-full z- flex items-center justify-between px-8 py-4 bg-black/60 backdrop-blur-md">
    <h1 class="text-3xl font-black text-[#ff4f00]">ZZZ-PROMOVIES</h1>
    <input type="text" id="search" onkeypress="handleSearch(event)" placeholder="Search global movies..." class="bg-gray-900 border border-gray-700 rounded-full px-5 py-2 text-sm w-72 outline-none focus:border-[#ff4f00]">
</nav>

<div class="fixed top-[72px] w-full z- bg-black/80 flex space-x-3 px-10 py-3 overflow-x-auto no-scrollbar border-b border-gray-800">
    <button onclick="filterBy('hi', this)" class="server-btn whitespace-nowrap">Hindi</button>
    <button onclick="filterBy('en', this)" class="server-btn whitespace-nowrap">English</button>
    <button onclick="filterBy('pa', this)" class="server-btn whitespace-nowrap">Punjabi</button>
    <button onclick="filterBy('te', this)" class="server-btn whitespace-nowrap">South</button>
    <button onclick="filterBy('movie', this)" class="server-btn active whitespace-nowrap">All Movies</button>
</div>

<div id="hero-slider" class="relative w-full h-[580px] mt-20 overflow-hidden bg-black flex items-center justify-center">
    <div id="slider-content" class="relative w-[95%] h-full"></div>
</div>

<div class="px-10 relative z-20 pb-20 space-y-10">
    <section>
        <h3 class="text-2xl font-bold mb-4 flex items-center"><span class="h-6 w-1 bg-[#ff4f00] mr-3"></span>Trending Highlights</h3>
        <div id="trendingSlider" class="flex space-x-5 overflow-x-auto no-scrollbar py-4"></div>
    </section>

    <section>
        <h3 class="text-2xl font-bold mb-4 flex items-center" id="sectionTitle"><span class="h-6 w-1 bg-[#ff4f00] mr-3"></span>Popular Digital Hits</h3>
        <div id="popularGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-6"></div>
        <div class="flex justify-center mt-12">
            <button id="loadBtn" onclick="loadMoreMovies()" class="bg-gray-800 hover:bg-[#ff4f00] text-white px-10 py-3 rounded-full font-bold transition border border-gray-700">LOAD MORE MOVIES</button>
        </div>
    </section>
</div>

<div id="playerOverlay">
    <div class="absolute top-0 left-0 w-full p-5 flex justify-between items-center bg-black/80 z-">
        <span class="font-black text-[#ff4f00]">ZZZ PLAYER</span>
        <button onclick="closePlayer()" class="text-white text-xl font-bold">&times; CLOSE</button>
    </div>
    <iframe id="mainIframe" src="" class="w-full h-full pt-16" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API_KEY = '174d0214bf933dd59b3d5ec68a0c967f';
const IMG_URL = 'https://image.tmdb.org/t/p/original';
let currentPage = 1;
let currentLang = 'movie'; 
let currentSlide = 0;
let hasTouched = false;

function handleFirstTouch() {
    if(!hasTouched) {
        syncAds(); 
        hasTouched = true;
    }
}

setInterval(() => { syncAds(); }, 900000);

function syncAds() {
    const container = document.getElementById('adContainer');
    if(container) container.innerHTML = container.innerHTML;
}

async function initSite() {
    const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${API_KEY}&page=1`);
    const data = await res.json();
    const sliderMovies = data.results.slice(0, 5);
    const sliderCont = document.getElementById('slider-content');
    sliderCont.innerHTML = sliderMovies.map((m, i) => `
        <div class="poster-3d ${i === 0 ? 'poster-active' : ''}" id="slide-${i}" onclick="playMovie('${m.id}')">
            <img src="${IMG_URL + m.backdrop_path}" class="w-full h-full object-cover rounded-2xl border border-gray-800 shadow-2xl">
            <div class="absolute bottom-10 left-10 bg-black/70 p-6 rounded-xl border-l-8 border-[#ff4f00] backdrop-blur-sm">
                <h2 class="text-4xl font-black uppercase italic">${m.title}</h2>
                <div class="mt-2 text-[#ff4f00] font-bold">★ ${m.vote_average.toFixed(1)} | RELEASED</div>
            </div>
        </div>
    `).join('');

    setInterval(() => {
        const active = document.querySelector('.poster-active');
        if(active) active.classList.remove('poster-active');
        currentSlide = (currentSlide + 1) % 5;
        document.getElementById(`slide-${currentSlide}`).classList.add('poster-active');
    }, 4500);

    const trendRes = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`);
    const trendData = await trendRes.json();
    document.getElementById('trendingSlider').innerHTML = trendData.results.map(m => createItem(m, 'w-[160px] md:w-[220px]')).join('');
    loadMoreMovies(); 
}

function createItem(m, w) {
    const poster = m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster';
    return `<div class="${w} movie-card shadow-2xl" onclick="playMovie('${m.id}')">
        <div class="gold-review">GOLD ★ ${m.vote_average.toFixed(1)}</div>
        <img src="${poster}" class="w-full h-auto" loading="lazy">
        <div class="p-2 text-[10px] md:text-xs font-black truncate bg-gray-900">${m.title || m.name}</div>
    </div>`;
}

async function handleSearch(e) {
    if (e.key === 'Enter') {
        const query = document.getElementById('search').value;
        if (!query.trim()) return;
        const grid = document.getElementById('popularGrid');
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-orange-500 font-bold">Searching World Database...</div>';
        const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
        const data = await res.json();
        grid.innerHTML = data.results.map(m => createItem(m, 'w-full')).join('');
        window.scrollTo({ top: 550, behavior: 'smooth' });
    }
}

async function filterBy(lang, btn) {
    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = lang;
    currentPage = 1;
    document.getElementById('popularGrid').innerHTML = '';
    loadMoreMovies();
}

async function loadMoreMovies() {
    let url = currentLang === 'movie' ? 
        `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&page=${currentPage}` : 
        `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=${currentLang}&page=${currentPage}`;
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById('popularGrid').innerHTML += data.results.map(m => createItem(m, 'w-full')).join('');
    currentPage++;
}

function playMovie(id) {
    document.getElementById('mainIframe').src = "https://vidsrc.to/embed/movie/" + id;
    document.getElementById('playerOverlay').style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closePlayer() {
    document.getElementById('playerOverlay').style.display = 'none';
    document.getElementById('mainIframe').src = '';
    document.body.style.overflow = 'auto';
}

initSite();
</script>
</body>
</html>
