<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHOO PAY SERVICE | ALL INDIA LOCATION</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --secondary: #ff5722;
            --dark: #121212;
            --grad: linear-gradient(135deg, #4a148c 0%, #880e4f 50%, #d32f2f 100%);
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--grad); min-height: 100vh; margin: 0; color: #333; }
        .header { background: rgba(0,0,0,0.6); color: white; padding: 25px; text-align: center; font-weight: 800; font-size: 24px; text-transform: uppercase; border-bottom: 3px solid var(--secondary); letter-spacing: 1px; }
        .container { background: white; margin: 20px 15px; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; animation: slideIn 0.4s; }
        .active { display: block; }
        @keyframes slideIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        
        .btn-3d { 
            background: var(--secondary); color: white; border: none; width: 100%; padding: 18px; font-weight: bold; border-radius: 12px; font-size: 18px; cursor: pointer;
            box-shadow: 0 6px #bf360c; transition: 0.1s; text-transform: uppercase; margin-top: 15px;
        }
        .btn-3d:active { box-shadow: 0 2px #bf360c; transform: translateY(4px); }
        .btn-3d:disabled { background: #ccc; box-shadow: 0 6px #999; cursor: not-allowed; }
        
        label { font-weight: bold; color: var(--primary); display: block; margin-bottom: 8px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .star { color: red; }
        
        .footer { background: var(--dark); color: #888; padding: 40px 20px; text-align: center; margin-top: 50px; border-top: 5px solid var(--secondary); }
        .restricted { color: #ff1744; font-weight: 900; border: 2px solid #ff1744; padding: 5px 15px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">CASHOO PAY SERVICE</div>

    <div class="container active" id="step1">
        <label>1. Select Category <span class="star">*</span></label>
        <select id="cat">
            <option>Male Escort</option>
            <option>Call Girl</option>
            <option>Massage Girl</option>
            <option>Massage Boy</option>
        </select>

        <label>2. Select Major City/District <span class="star">*</span></label>
        <select id="city">
            <option value="">-- Select Your District --</option>
            <optgroup label="UP / North">
                <option>Mathura</option><option>Agra</option><option>Lucknow</option><option>Delhi/NCR</option><option>Noida</option><option>Ghaziabad</option><option>Kanpur</option><option>Varanasi</option><option>Meerut</option>
            </optgroup>
            <optgroup label="Maharashtra / West">
                <option>Mumbai</option><option>Pune</option><option>Nagpur</option><option>Thane</option><option>Nashik</option><option>Ahmedabad</option><option>Surat</option>
            </optgroup>
            <optgroup label="South India">
                <option>Bangalore</option><option>Hyderabad</option><option>Chennai</option><option>Kochi</option><option>Mysore</option><option>Vizag</option>
            </optgroup>
            <optgroup label="East / Central">
                <option>Kolkata</option><option>Patna</option><option>Ranchi</option><option>Bhopal</option><option>Indore</option><option>Jaipur</option><option>Guwahati</option>
            </optgroup>
        </select>

        <label>3. Specify Area / Village / Landmark <span class="star">*</span></label>
        <input type="text" id="area" placeholder="Write Village name or Area (e.g. Vrindavan, Sector 62)">

        <button class="btn-3d" onclick="checkStep1()">NEXT STEP</button>
    </div>

    <div class="container" id="step2">
        <label>Ad Title <span class="star">*</span></label>
        <input type="text" id="title" placeholder="Eye-catching title">
        <label>Description <span class="star">*</span></label>
        <textarea id="desc" rows="4" placeholder="Full details..."></textarea>
        
        <div style="border:2px dashed var(--primary); padding:20px; text-align:center; border-radius:15px; background:#f9f0ff;" onclick="document.getElementById('f-in').click()">
            <span id="st">📸 Upload Photo (Village/Area verified)</span>
            <input type="file" id="f-in" style="display:none" onchange="up(this)">
        </div><br>
        
        <button class="btn-3d" id="btn2" onclick="go(3)" disabled>NEXT: CONTACT</button>
        <button class="btn-3d" style="background:#555; box-shadow:0 6px #333;" onclick="go(1)">BACK</button>
    </div>

    <div class="container" id="step3">
        <label>Phone Number <span class="star">*</span></label>
        <input type="text" id="ph" placeholder="+91 00000-00000">
        <div style="font-size:13px; background:#eee; padding:15px; border-radius:10px;">
            <input type="checkbox" id="p1"> I agree to <b>CASHOO PAY</b> Village/City Terms <span class="star">*</span><br><br>
            <input type="checkbox" id="p2"> Verified Data processing authorization <span class="star">*</span>
        </div><br>
        <button class="btn-3d" id="btn3" onclick="go(4)" disabled>PREVIEW AD</button>
        <button class="btn-3d" style="background:#555; box-shadow:0 6px #333;" onclick="go(2)">BACK</button>
    </div>

    <div class="container" id="step4">
        <h2 style="text-align:center;">LIVE PREVIEW</h2>
        <div style="border:1px solid #ddd; border-radius:15px; overflow:hidden; background:#fff;">
            <img id="p-img" style="width:100%;">
            <div style="padding:15px;">
                <h3 id="p-title" style="margin:0;"></h3>
                <p id="p-loc" style="color:var(--secondary); font-weight:bold;"></p>
                <p id="p-desc" style="color:#666;"></p>
            </div>
        </div><br>
        <button class="btn-3d" style="background:#2ecc71; box-shadow:0 6px #27ae60;" onclick="pub()">🚀 PUBLISH IN AREA</button>
        <button class="btn-3d" style="background:#555; box-shadow:0 6px #333;" onclick="go(3)">EDIT</button>
    </div>

    <div class="footer">
        <div class="restricted">18+ RESTRICTED</div>
        <p>CASHOO PAY SERVICE - All India Network</p>
        <p style="font-size:10px;">SOFYAN LIMITED, Cyprus | Village & City Ad Portal</p>
    </div>

    <script>
        const SURL = 'https://script.google.com/macros/s/AKfycbwDLNhMit5MXHi6dWLS82_avlS4UWBGGeO3QzhGcEVNwF-t0WM0LTona4G6Xt8gjiZnSw/exec';
        const KEYS = ['66b93bbc5730f7a268d8893172a33427', '7f4aef5f09b96121682b41d0502f8746', '902f6f663016116846a9edf1108e504d'];
        let img = "";

        function checkStep1() {
            if(!document.getElementById('city').value || !document.getElementById('area').value) {
                alert("Please select District and enter Area/Village!"); return;
            }
            go(2);
        }

        function go(s) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            if(s === 4) {
                document.getElementById('p-img').src = img;
                document.getElementById('p-title').innerText = document.getElementById('title').value;
                document.getElementById('p-loc').innerText = "📍 " + document.getElementById('city').value + " > " + document.getElementById('area').value;
                document.getElementById('p-desc').innerText = document.getElementById('desc').value;
            }
            window.scrollTo(0,0);
        }

        async function up(input) {
            const f = input.files; const s = document.getElementById('st');
            if(!f) return; s.innerText = "⏳ Uploading to Area Server...";
            for(let k of KEYS) {
                let fd = new FormData(); fd.append('image', f);
                try {
                    let r = await fetch(`https://api.imgbb.com/1/upload?key=${k}`, {method:'POST', body:fd});
                    let j = await r.json();
                    if(j.success) { img = j.data.url; s.innerText = "✅ Uploaded!"; document.getElementById('btn2').disabled = false; return; }
                } catch(e) {}
            }
            s.innerText = "❌ Fail! Use another photo.";
        }

        setInterval(() => {
            const ok = document.getElementById('ph').value && document.getElementById('p1').checked && document.getElementById('p2').checked;
            document.getElementById('btn3').disabled = !ok;
        }, 500);

        async function pub() {
            alert("Submitting to CASHOO PAY Database...");
            const d = { name: document.getElementById('title').value, city: document.getElementById('city').value, area: document.getElementById('area').value, phone: document.getElementById('ph').value, photoUrl: img, category: document.getElementById('cat').value, desc: document.getElementById('desc').value };
            await fetch(SURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("Success! Your Ad is live in " + d.area);
            location.reload();
        }
    </script>
</body>
</html>
