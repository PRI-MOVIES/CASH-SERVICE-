<script>
    // इन 3 चाबियों को मैंने बदल दिया है, इन्हें ट्राई करें
    const KEYS = [
        '66b93bbc5730f7a268d8893172a33427', 
        '7f4aef5f09b96121682b41d0502f8746', 
        '902f6f663016116846a9edf1108e504d'
    ];
    let img = "";

    async function up(input) {
        const f = input.files; 
        const s = document.getElementById('st');
        
        if(!f) return;
        
        // फाइल साइज़ चेक (5MB से कम होनी चाहिए)
        if(f.size > 5242880) {
            alert("फोटो बहुत बड़ी है! कृपया 5MB से छोटी फोटो चुनें।");
            return;
        }

        s.innerText = "⏳ CASHOO Server पर अपलोड हो रहा है...";
        s.style.color = "orange";

        let uploadSuccess = false;

        for(let k of KEYS) {
            if(uploadSuccess) break;

            let fd = new FormData();
            fd.append('image', f);

            try {
                let r = await fetch(`https://api.imgbb.com/1/upload?key=${k}`, {
                    method: 'POST',
                    body: fd
                });
                
                let j = await r.json();

                if(j.success) {
                    img = j.data.url;
                    s.innerText = "✅ फोटो सुरक्षित अपलोड हो गई!";
                    s.style.color = "green";
                    document.getElementById('btn2').disabled = false;
                    uploadSuccess = true;
                } else {
                    console.log("Key failed, trying next...");
                }
            } catch(e) {
                console.error("Network Error:", e);
            }
        }

        if(!uploadSuccess) {
            s.innerText = "❌ अपलोड फेल! दूसरी फोटो ट्राई करें।";
            s.style.color = "red";
            alert("सर्वर में समस्या है, कृपया दूसरी फोटो चुनें या बाद में ट्राई करें।");
        }
    }
</script>
