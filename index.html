<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="google-site-verification" content="1XYvNp3KDylNaVS3TH15kSAKQHPIjMQZm_zIHLQBIt8" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZZ-PROMOVIES - Multi-Server OTT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script async="async" data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>
<style>
:root { --watcho-orange: #ff4f00; --bg-dark: #07080a; }
body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* स्मार्ट एड हाइडर (लोड होगा पर दिखेगा नहीं) */
.hidden-ad-box { width: 1px; height: 1px; opacity: 0.01; overflow: hidden; position: absolute; top: -100px; }

/* 3D पोस्टर स्लाइडर एनीमेशन */
.poster-3d { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease; }
.poster-active { transform: scale(1) translateZ(0); opacity: 1; position: relative; z-index: 10; }
.poster-hidden { transform: scale(0.8) translateZ(-100px); opacity: 0; position: absolute; z-index: 0; }

.movie-card { transition: all 0.3s ease; flex-shrink: 0; cursor: pointer; border-radius: 8px; overflow: hidden; position: relative; }
.movie-card:hover { transform: translateY(-10px) scale(1.05); border: 2px solid var(--watcho-orange); }
.hero-gradient { background: linear-gradient(to top, var(--bg-dark) 10%, transparent 100%); }
#playerOverlay { display: none; position: fixed; inset: 0; background: black; z-index: 9999; }
.server-btn { background: #222; padding: 8px 15px; border-radius: 5px; font-size: 12px; transition: 0.3s; }
.server-btn:hover, .server-btn.active { background: var(--watcho-orange); }
.gold-review { position: absolute; top: 5px; right: 5px; background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

@media (max-width: 768px) {
    nav { padding: 10px 15px !important; flex-wrap: wrap; height: auto !important; }
    nav h1 { text-align: center; width: 100%; margin-bottom: 10px; font-size: 1.5rem !important; }
    #search { width: 100% !important; margin-top: 10px; }
    .fixed.top-\[72px\] { top: 130px !important; padding: 10px !important; }
    #hero-slider { margin-top: 150px !important; height: 450px !important; }
}
</style>
</head>
<body>

<div class="hidden-ad-box">
    <div id="container-745c1ef3a6af871203febf2e53f94208"></div>
    <script async="async" data-cfasync="false" src="https://www.highperformanceformat.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>
</div>

<nav class="fixed top-0 w-full z- flex items-center justify-between px-8 py-4 bg-black/60 backdrop-blur-md">
<div class="flex items-center space-x-10">
<h1 class="text-3xl font-black text-[#ff4f00]">ZZZ-PROMOVIES</h1>
<div class="hidden md:flex space-x-6 text-sm font-bold uppercase tracking-tighter">
<a href="#" class="text-[#ff4f00]">Home</a>
<a href="#" class="hover:text-[#ff4f00]">Movies</a>
<a href="#" class="hover:text-[#ff4f00]">Originals</a>
</div>
</div>
<div class="flex items-center space-x-4">
<input type="text" id="search" placeholder="Search..." class="bg-gray-900 border border-gray-700 rounded-full px-5 py-2 text-sm w-72 outline-none focus:border-[#ff4f00]">
</div>
</nav>

<div class="fixed top-[72px] w-full z- bg-black/80 flex space-x-3 px-10 py-3 overflow-x-auto no-scrollbar border-b border-gray-800">
<button onclick="filterBy('hi', this)" class="server-btn active whitespace-nowrap">Hindi</button>
<button onclick="filterBy('en', this)" class="server-btn whitespace-nowrap">English</button>
<button onclick="filterBy('pa', this)" class="server-btn whitespace-nowrap">Punjabi</button>
<button onclick="filterBy('te', this)" class="server-btn whitespace-nowrap">South</button>
<button onclick="filterBy('movie', this)" class="server-btn whitespace-nowrap">All Movies</button>
</div>

<div id="hero-slider" class="relative w-full h-[600px] mt-20 overflow-hidden flex items-center justify-center bg-black">
    <div id="slider-content" class="relative w-[90%] md:w-[80%] h-full flex items-center justify-center">
        <div class="text-white animate-pulse">Loading Superhits...</div>
    </div>
</div>

<div class="px-10 relative z-20 pb-20 space-y-10">
<section>
<h3 class="text-2xl font-bold mb-4 flex items-center" id="sectionTitle"><span class="h-6 w-1 bg-[#ff4f00] mr-3"></span>Trending Highlights</h3>
<div id="trendingSlider" class="flex space-x-5 overflow-x-auto no-scrollbar py-4"></div>
</section>

<section>
<h3 class="text-2xl font-bold mb-4 flex items-center"><span class="h-6 w-1 bg-[#ff4f00] mr-3"></span>Popular Digital Hits</h3>
<div id="popularGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-6"></div>
<div class="flex justify-center mt-12">
<button id="loadMore" onclick="loadMoreMovies()" class="bg-gray-800 hover:bg-[#ff4f00] text-white px-10 py-3 rounded-full font-bold transition">LOAD MORE</button>
</div>
</section>
</div>

<div id="playerOverlay">
<div class="absolute top-0 left-0 w-full p-5 flex justify-between items-center bg-black/80 z-">
<div id="serverList" class="flex space-x-3"><button class="server-btn active">Server 1</button></div>
<button onclick="closePlayer()" class="text-white text-xl font-bold">&times; CLOSE</button>
</div>
<iframe id="mainIframe" src="" class="w-full h-full pt-16" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API_KEY = '174d0214bf933dd59b3d5ec68a0c967f';
const IMG_URL = 'https://image.tmdb.org/t/p/original';
let currentSlide = 0;
let sliderMovies = [];

async function fetchContent() {
  const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${API_KEY}&language=hi-IN&page=1`);
  const data = await res.json();
  sliderMovies = data.results.slice(0, 5);
  renderSlider();
  
  const trending = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`);
  const tData = await trending.json();
  document.getElementById('trendingSlider').innerHTML = tData.results.map(m => createItem(m, 'w-[150px] md:w-[210px]')).join('');
  
  const popular = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
  const pData = await popular.json();
  document.getElementById('popularGrid').innerHTML = pData.results.map(m => createItem(m, 'w-full')).join('');
}

function renderSlider() {
    const container = document.getElementById('slider-content');
    container.innerHTML = sliderMovies.map((m, i) => `
        <div class="poster-3d ${i === 0 ? 'poster-active' : 'poster-hidden'} absolute inset-0 rounded-2xl shadow-2xl cursor-pointer" 
             onclick="playMovie('${m.id}')" id="slide-${i}">
            <img src="${IMG_URL + m.backdrop_path}" class="w-full h-full object-cover rounded-2xl border-2 border-orange-600">
            <div class="absolute bottom-10 left-10 text-left bg-black/60 p-6 rounded-xl backdrop-blur-md border-l-4 border-orange-600">
                <span class="bg-orange-600 text-xs font-bold px-2 py-1 rounded">SUPER HIT</span>
                <h2 class="text-4xl font-black mt-2">${m.title}</h2>
                <p class="text-gray-300 text-sm max-w-md hidden md:block mt-2 italic">${m.overview.slice(0,100)}...</p>
            </div>
        </div>
    `).join('');

    setInterval(() => {
        document.getElementById(`slide-${currentSlide}`).className = "poster-3d poster-hidden absolute inset-0";
        currentSlide = (currentSlide + 1) % sliderMovies.length;
        document.getElementById(`slide-${currentSlide}`).className = "poster-3d poster-active absolute inset-0";
    }, 4000);
}

function createItem(m, w) {
  return `<div class="${w} movie-card shadow-2xl" onclick="playMovie('${m.id}')"><img src="${IMG_URL + m.poster_path}" class="w-full h-auto"><div class="p-2 text-[10px] md:text-xs font-black truncate bg-gray-900">${m.title || m.name}</div></div>`;
}

function playMovie(id) {
  document.getElementById('mainIframe').src = "https://vidsrc.to/embed/movie/" + id;
  document.getElementById('playerOverlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  document.getElementById('playerOverlay').style.display = 'none';
  document.getElementById('mainIframe').src = '';
  document.body.style.overflow = 'auto';
}

fetchContent();
</script>
</body>
</html>
